<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>التسجيل المبكر</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      min-height: 100vh;
      background: #1a1a2e;
      background-image: url('poster.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    .overlay {
      min-height: 100vh;
      background: rgba(0,0,0,0.4);
      position: relative;
    }

    /* ===== العداد - زاوية يسار عليا ===== */
    .counter-box {
      position: fixed;
      top: 24px;
      left: 24px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 16px;
      padding: 16px 24px;
      color: white;
      text-align: center;
      z-index: 1000;
      min-width: 160px;
    }

    .slots-number {
      font-size: 48px;
      font-weight: bold;
      color: #FFD700;
      line-height: 1;
    }

    .slots-label {
      font-size: 12px;
      opacity: 0.9;
      margin-top: 4px;
    }

    .timer {
      margin-top: 10px;
      font-size: 12px;
      opacity: 0.8;
      border-top: 1px solid rgba(255,255,255,0.2);
      padding-top: 8px;
    }

    .timer-value {
      font-size: 18px;
      font-weight: bold;
      color: #FF6B6B;
      direction: ltr;
    }

    /* ===== زر التسجيل ===== */
    .register-btn-container {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
    }

    .register-btn {
      background: #FFD700;
      color: #1a1a2e;
      border: none;
      border-radius: 50px;
      padding: 18px 60px;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 8px 30px rgba(255,215,0,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
      font-family: inherit;
      text-decoration: none;
      display: inline-block;
    }

    .register-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 40px rgba(255,215,0,0.6);
    }

    .full-notice {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,0,0,0.8);
      color: white;
      border-radius: 50px;
      padding: 18px 60px;
      font-size: 18px;
      font-weight: bold;
      display: none;
      z-index: 1000;
    }
  </style>
</head>
<body>

<div class="overlay"></div>

<!-- العداد -->
<div class="counter-box">
  <div class="slots-number" id="slotsCount">--</div>
  <div class="slots-label">مقعد متبقي من أصل 20</div>
  <div class="timer">
    ⏳ ينتهي العرض خلال
    <div class="timer-value" id="timerDisplay">--:--:--</div>
  </div>
</div>

<!-- زر التسجيل -->
<div class="register-btn-container">
  <a href="form.html" class="register-btn" id="registerBtn">
    🎒 سجل الآن واحجز مقعدك
  </a>
  <div class="full-notice" id="fullNotice">
    🎉 امتلأت المقاعد!
  </div>
</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzflk7sxkE580YVt0RjcXCb3_blabbCvKUk6Fuj_uwOPQLNW3M6FE40XlX5yolMK32BAw/exec';
  const OFFER_END_DATE = new Date('2025-09-10T14:00:00');

  async function updateSlots() {
    try {
      const res = await fetch(SCRIPT_URL + '?action=getSlots');
      const data = await res.json();
      document.getElementById('slotsCount').textContent = data.availableSlots;

      if (data.availableSlots <= 0) {
        document.getElementById('registerBtn').style.display = 'none';
        document.getElementById('fullNotice').style.display = 'block';
      }
    } catch (e) {}
  }

  function updateTimer() {
    const now = new Date();
    const diff = OFFER_END_DATE - now;

    if (diff <= 0) {
      document.getElementById('timerDisplay').textContent = 'انتهى العرض';
      return;
    }

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((diff % (1000 * 60)) / 1000);

    document.getElementById('timerDisplay').textContent =
      `${days}ي ${String(hours).padStart(2,'0')}:${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`;
  }

  updateSlots();
  updateTimer();
  setInterval(updateTimer, 1000);
  setInterval(updateSlots, 30000);
</script>

</body>
</html>
